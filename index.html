<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3a8ee6" />
  <title>日迹 · 个人生活系统</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brandEl" data-act="jump" data-tab="today" role="button" title="回到主页">日迹</div>
    <div class="brand-sub" id="todayLabel"></div>
    <button class="add-btn" data-act="open-led" title="记账" aria-label="记账">＋</button>
    <button class="icon-btn" id="themeToggle" data-act="toggle-theme" style="font-size:18px;align-self:center" title="切换日间 / 夜间">☀️</button>
    <button class="icon-btn me-btn" id="meBtn" data-act="nav-me" style="font-size:20px;align-self:center">⚙️</button>
  </header>

  <main id="view" class="view"><!-- 视图由 app.js 渲染 --></main>

  <nav class="tabbar">
    <button class="tab" data-view="today"><span>🏠</span><label>主页</label></button>
    <button class="tab" data-view="money"><span>💰</span><label>账</label></button>
    <button class="tab" data-view="notes"><span>📁</span><label>记录</label></button>
  </nav>

  <!-- 底部弹层：新增 / 编辑 / 详情 -->
  <div id="sheet" class="sheet" hidden>
    <div class="sheet-back" data-act="sheet-close"></div>
    <div class="sheet-card">
      <div class="sheet-head">
        <span id="sheet-title">记录</span>
        <button class="icon-btn" data-act="sheet-close">✕</button>
      </div>
      <div id="sheet-body" class="sheet-body"></div>
    </div>
  </div>

  <!-- 确认弹窗：替代原生 confirm（原生 confirm 在预览/iframe 环境会被拦截，导致所有删除失效） -->
  <div id="confirm" class="confirm" hidden>
    <div class="confirm-back" id="confirm-back"></div>
    <div class="confirm-card" role="dialog" aria-modal="true">
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-foot">
        <button class="btn ghost" id="confirm-no">取消</button>
        <button class="btn danger" id="confirm-yes">删除</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast-wrap"></div>
  <audio id="chime" preload="auto" src="data:audio/wav;base64,UklGRl9vAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>

  <script src="app.js"></script>
</body>
</html>
