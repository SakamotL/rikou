# 定时触发推送后端：每分钟调用 Worker 的 /api/cron
# 用 GitHub Actions 免费触发，绕过 Cloudflare Cron Triggers 的付费限制
name: push-cron
on:
  schedule:
    - cron: '* * * * *'   # 每分钟
  workflow_dispatch:      # 允许手动触发测试

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 调用推送 cron
        run: |
          curl -fsS -m 20 "${{ secrets.PUSH_WORKER_URL }}/api/cron" \
            || echo "cron 调用失败（Worker 未部署或地址未配置）"
